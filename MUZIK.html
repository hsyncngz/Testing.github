<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duru</title>

<style>

:root{
    --bg:#0b0b0b;
    --card:#151515;
    --soft:#1d1d1d;
    --text:#ffffff;
    --sub:#a0a0a0;
    --green:#1ed760;
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    overflow:hidden;
}

/* TOP */

.top{
    padding:14px;
    position:sticky;
    top:0;
    z-index:100;
    background:rgba(11,11,11,.95);
    backdrop-filter:blur(20px);
}

.search{
    width:100%;
    border:none;
    background:var(--soft);
    color:#fff;
    padding:14px 18px;
    border-radius:16px;
    font-size:15px;
    outline:none;
}

/* CATEGORY */

.categories{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-top:12px;
    scrollbar-width:none;
}

.categories::-webkit-scrollbar{
    display:none;
}

.cat{
    padding:9px 16px;
    border-radius:999px;
    background:#1b1b1b;
    color:#ddd;
    white-space:nowrap;
    font-size:13px;
    cursor:pointer;
    transition:.2s;
}

.cat.active{
    background:var(--green);
    color:#000;
    font-weight:600;
}

/* LIST */

#list{
    height:calc(100vh - 190px);
    overflow:auto;
    padding:10px 12px 150px;
}

.song{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px;
    border-radius:18px;
    transition:.2s;
    cursor:pointer;
}

.song:hover{
    background:#161616;
}

.song.active{
    background:#171717;
}

.song img{
    width:58px;
    height:58px;
    border-radius:14px;
    object-fit:cover;
    flex-shrink:0;
}

.meta{
    flex:1;
    overflow:hidden;
}

.title{
    font-size:15px;
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.sub{
    font-size:12px;
    color:var(--sub);
    margin-top:4px;
}

/* EQ */

.eq{
    display:none;
    align-items:flex-end;
    gap:2px;
    width:16px;
    height:16px;
    margin-right:4px;
}

.eq span{
    width:3px;
    background:var(--green);
    border-radius:10px;
    animation:bounce 1s infinite ease-in-out;
}

.eq span:nth-child(2){animation-delay:.2s;}
.eq span:nth-child(3){animation-delay:.4s;}
.eq span:nth-child(4){animation-delay:.6s;}

@keyframes bounce{
    0%,100%{height:4px;}
    50%{height:16px;}
}

/* PLAYER */

.player{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(15,15,15,.96);
    backdrop-filter:blur(20px);
    border-top:1px solid #222;
    padding:12px;
}

.player-top{
    display:flex;
    align-items:center;
    gap:12px;
}

.player-top img{
    width:54px;
    height:54px;
    border-radius:14px;
    object-fit:cover;
}

.player-meta{
    flex:1;
    overflow:hidden;
}

#nowTitle{
    font-size:14px;
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

#nowCat{
    color:var(--sub);
    font-size:12px;
    margin-top:3px;
}

/* PROGRESS */

.progress{
    width:100%;
    height:5px;
    background:#2b2b2b;
    border-radius:30px;
    overflow:hidden;
    margin-top:14px;
    cursor:pointer;
}

.fill{
    height:100%;
    width:0%;
    background:var(--green);
}

.times{
    display:flex;
    justify-content:space-between;
    margin-top:6px;
    font-size:11px;
    color:#888;
}

/* CONTROLS */

.controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:34px;
    margin-top:14px;
}

.controls button{
    background:none;
    border:none;
    color:#fff;
    cursor:pointer;
}

.side{
    font-size:28px;
}

.main{
    width:58px;
    height:58px;
    border-radius:50%;
    background:var(--green) !important;
    color:#000 !important;
    font-size:26px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="top">

    <input
        id="search"
        class="search"
        placeholder="Şarkı veya kategori ara..."
    >

    <div class="categories" id="categories"></div>

</div>

<div id="list"></div>

<div class="player">

    <div class="player-top">

        <img id="cover"
        src="https://via.placeholder.com/300x300/111111/1ed760?text=D">

        <div class="player-meta">
            <div id="nowTitle">Şarkı seç</div>
            <div id="nowCat">Kategori</div>
        </div>

    </div>

    <div class="progress" id="progress">
        <div class="fill" id="fill"></div>
    </div>

    <div class="times">
        <span id="current">0:00</span>
        <span id="total">0:00</span>
    </div>

    <div class="controls">

        <button class="side" onclick="prevSong()">⏮</button>

        <button class="main" id="playBtn"
        onclick="togglePlay()">▶</button>

        <button class="side" onclick="nextSong()">⏭</button>

    </div>

</div>

<audio id="audio"></audio>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTdRVAosbcPqFmuzurnWP7n_aEyUCafM9txkdVW5GnOh1pBpTAQXUNmjrbw-7s2ky-KwEhmpxQ974Sh/pub?gid=0&single=true&output=csv";

let songs = [];
let filtered = [];
let currentCategory = "";
let currentIndex = -1;

const audio = document.getElementById("audio");

/* CSV */

function parseCSV(text){

    const lines = text.trim().split("\n");

    const headers = lines[0].split(",");

    return lines.slice(1).map(line=>{

        const cols = line.split(",");

        let obj = {};

        headers.forEach((h,i)=>{
            obj[h.trim()] = cols[i];
        });

        return obj;

    });
}

/* LOAD */

async function loadSongs(){

    const res = await fetch(SHEET_URL);

    const txt = await res.text();

    songs = parseCSV(txt).map(s=>({

        title:s.SARKI,
        url:s.URL,
        category:s.KATEGORI,
        img:s.RESIM ||
        "https://via.placeholder.com/300x300/111111/1ed760?text=D"

    })).filter(s=>s.title && s.url);

    buildCategories();

    filtered = songs;

    render(filtered);
}

/* CATEGORY */

function buildCategories(){

    const wrap =
    document.getElementById("categories");

    wrap.innerHTML = "";

    const all = document.createElement("div");

    all.className = "cat active";

    all.innerText = "Tümü";

    all.onclick = ()=>{

        document.querySelectorAll(".cat")
        .forEach(x=>x.classList.remove("active"));

        all.classList.add("active");

        currentCategory = "";

        filterSongs();
    };

    wrap.appendChild(all);

    const cats =
    [...new Set(songs.map(s=>s.category))];

    cats.forEach(c=>{

        const div = document.createElement("div");

        div.className = "cat";

        div.innerText = c;

        div.onclick = ()=>{

            document.querySelectorAll(".cat")
            .forEach(x=>x.classList.remove("active"));

            div.classList.add("active");

            currentCategory = c;

            filterSongs();
        };

        wrap.appendChild(div);
    });
}

/* FILTER */

function filterSongs(){

    const q =
    document.getElementById("search")
    .value.toLowerCase();

    filtered = songs.filter(s=>{

        return (

            (!currentCategory ||
            s.category === currentCategory)

            &&

            (
                s.title.toLowerCase().includes(q)

                ||

                s.category.toLowerCase().includes(q)
            )
        );
    });

    currentIndex = -1;

    render(filtered);
}

/* RENDER */

function render(arr){

    const list =
    document.getElementById("list");

    list.innerHTML = "";

    arr.forEach((s,i)=>{

        const active =
        i === currentIndex;

        const div =
        document.createElement("div");

        div.className =
        "song " + (active ? "active": "");

        div.innerHTML = `

            <div class="eq"
            style="display:${
            active && !audio.paused
            ? 'flex':'none'
            }">

                <span></span>
                <span></span>
                <span></span>
                <span></span>

            </div>

            <img src="${s.img}">

            <div class="meta">

                <div class="title">
                ${s.title}
                </div>

                <div class="sub">
                ${s.category}
                </div>

            </div>
        `;

        div.onclick = ()=>{

            currentIndex = i;

            playSong();
        };

        list.appendChild(div);
    });
}

/* PLAY */

function playSong(){

    if(currentIndex < 0)
    currentIndex = 0;

    const s = filtered[currentIndex];

    audio.src = s.url;

    audio.play();

    document.getElementById("cover")
    .src = s.img;

    document.getElementById("nowTitle")
    .innerText = s.title;

    document.getElementById("nowCat")
    .innerText = s.category;

    document.getElementById("playBtn")
    .innerText = "⏸";

    render(filtered);

    preload();

    updateMediaSession();
}

/* PRELOAD */

function preload(){

    [currentIndex-1,currentIndex+1]
    .forEach(i=>{

        if(filtered[i]){

            const a = new Audio();

            a.src = filtered[i].url;

            a.preload = "auto";
        }
    });
}

/* PLAY BUTTON */

function togglePlay(){

    if(!audio.src){

        currentIndex = 0;

        playSong();

        return;
    }

    if(audio.paused){

        audio.play();

        document.getElementById("playBtn")
        .innerText = "⏸";

    }else{

        audio.pause();

        document.getElementById("playBtn")
        .innerText = "▶";
    }

    render(filtered);
}

/* NEXT */

function nextSong(){

    if(currentIndex <
    filtered.length - 1){

        currentIndex++;

    }else{

        currentIndex = 0;
    }

    playSong();
}

/* PREV */

function prevSong(){

    if(currentIndex > 0){

        currentIndex--;

    }else{

        currentIndex =
        filtered.length - 1;
    }

    playSong();
}

/* AUTO NEXT */

audio.onended = ()=>{

    nextSong();
};

/* PROGRESS */

audio.ontimeupdate = ()=>{

    const p =
    (audio.currentTime /
    audio.duration) * 100;

    document.getElementById("fill")
    .style.width = p + "%";

    document.getElementById("current")
    .innerText =
    format(audio.currentTime);

    document.getElementById("total")
    .innerText =
    format(audio.duration);
};

function format(sec){

    if(isNaN(sec))
    return "0:00";

    const m =
    Math.floor(sec/60);

    const s =
    Math.floor(sec%60);

    return `${m}:${s<10?'0':''}${s}`;
}

/* SEEK */

document.getElementById("progress")
.onclick = (e)=>{

    const w =
    e.currentTarget.clientWidth;

    const x = e.offsetX;

    audio.currentTime =
    (x / w) * audio.duration;
};

/* SEARCH */

document.getElementById("search")
.oninput = filterSongs;

/* MEDIA SESSION */

function updateMediaSession(){

    if('mediaSession' in navigator){

        const s = filtered[currentIndex];

        navigator.mediaSession.metadata =
        new MediaMetadata({

            title:s.title,

            artist:s.category,

            artwork:[
                {
                    src:s.img,
                    sizes:'512x512',
                    type:'image/png'
                }
            ]
        });

        navigator.mediaSession
        .setActionHandler(
        'nexttrack',
        nextSong
        );

        navigator.mediaSession
        .setActionHandler(
        'previoustrack',
        prevSong
        );
    }
}

loadSongs();

</script>

</body>
</html>
