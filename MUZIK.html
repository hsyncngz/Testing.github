```html
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duru Müzik</title>

<style>
body { background:#000; color:#fff; font-family:Arial; margin:0; }
#list { padding:15px; }
.song { padding:12px; border-bottom:1px solid #222; cursor:pointer; display:flex; gap:10px; align-items:center;}
.song img { width:50px; height:50px; border-radius:8px; object-fit:cover;}
.song:hover { background:#111; }
#player { position:fixed; bottom:0; width:100%; background:#111; padding:10px;}
</style>
</head>

<body>

<h2 style="padding:10px">🎧 Müzik Player </h2>

<input id="search" placeholder="Ara..." style="width:90%;margin:10px;padding:10px;background:#111;border:none;color:#fff">

<div id="list"></div>

<div id="player">
    <div id="now">Şarkı seç</div>
    <audio id="audio" controls style="width:100%"></audio>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTdRVAosbcPqFmuzurnWP7n_aEyUCafM9txkdVW5GnOh1pBpTAQXUNmjrbw-7s2ky-KwEhmpxQ974Sh/pub?gid=0&single=true&output=csv";

let songs = [];
let queue = [];
let currentIndex = -1;

const list = document.getElementById("list");
const audio = document.getElementById("audio");
const now = document.getElementById("now");

// CSV parse (daha sağlam)
function parseCSV(text){
    const lines = text.split("\n");
    const headers = lines[0].split(",");

    return lines.slice(1).map(line=>{
        const cols = line.split(",");
        let obj = {};
        headers.forEach((h,i)=> obj[h.trim()] = cols[i]);
        return obj;
    });
}

// load
async function load(){
    const res = await fetch(SHEET_URL);
    const txt = await res.text();

    songs = parseCSV(txt).map((s,i)=>({
        title: s.SARKI,
        url: s.URL,
        album: s.ALBUM,
        cat: s.KATEGORI,
        img: s.RESIM || "https://via.placeholder.com/150/000000/ff0000?text=DURU"
    })).filter(s=>s.title && s.url);

    queue = songs;
    render(queue);
}

// render
function render(arr){
    list.innerHTML = "";
    arr.forEach((s,i)=>{
        let d = document.createElement("div");
        d.className="song";

        d.innerHTML = `
            <img src="${s.img}">
            <div>
                <div>${s.title}</div>
                <div style="font-size:12px;color:#aaa">${s.album}</div>
            </div>
        `;

        d.onclick=()=>{
            queue = arr;
            currentIndex = i;
            play();
        };

        list.appendChild(d);
    });
}

// play
function play(){
    let s = queue[currentIndex];
    audio.src = s.url;
    audio.play();
    now.innerText = s.title + " - " + s.album;
    preload();
}

// preload (önceki + sonraki)
function preload(){
    [currentIndex-1,currentIndex+1].forEach(i=>{
        if(queue[i]){
            let a = new Audio();
            a.src = queue[i].url;
            a.preload="auto";
        }
    });
}

// next auto
audio.onended = ()=>{
    if(currentIndex < queue.length-1){
        currentIndex++;
        play();
    }
};

// search
document.getElementById("search").oninput = (e)=>{
    let q = e.target.value.toLowerCase();

    let f = songs.filter(s =>
        s.title.toLowerCase().includes(q) ||
        s.album.toLowerCase().includes(q) ||
        s.cat.toLowerCase().includes(q)
    );

    render(f);
};

load();
</script>

</body>
</html>
