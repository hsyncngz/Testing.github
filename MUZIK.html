```html
<!-- SADECE SCRIPT KISMI DEĞİŞTİ -->
<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTdRVAosbcPqFmuzurnWP7n_aEyUCafM9txkdVW5GnOh1pBpTAQXUNmjrbw-7s2ky-KwEhmpxQ974Sh/pub?gid=0&single=true&output=csv";

const audio = document.getElementById('audio');

let allSongs = [];
let currentQueue = [];
let currentIndex = -1;
let selectedSong = null;

let cache = {}; // preload cache

// CSV PARSE
function parseCSV(text){
    const rows = text.split("\n").map(r => r.split(","));
    const headers = rows[0];

    return rows.slice(1).map(r => {
        let o = {};
        headers.forEach((h,i)=> o[h.trim()] = r[i]);
        return o;
    });
}

// SHEETTEN YÜKLE
async function loadSongs(){
    const res = await fetch(SHEET_URL);
    const csv = await res.text();

    allSongs = parseCSV(csv).map((s,i)=>({
        id:i,
        title:s.SARKI,
        user:{ name:s.ALBUM },
        album:s.ALBUM,
        category:s.KATEGORI,
        artwork:{
            '150x150': s.RESIM || "https://via.placeholder.com/150/000000/ff0000?text=DURU",
            '480x480': s.RESIM || "https://via.placeholder.com/600/000000/ff0000?text=DURU"
        },
        streamUrl:s.URL
    })).filter(s=>s.title && s.streamUrl);

    render(allSongs);
}

// RENDER
function render(tracks){
    const div = document.getElementById('results');
    div.innerHTML = "";

    tracks.forEach((t,i)=>{
        const card = document.createElement('div');
        card.className = "song-card";

        card.innerHTML = `
            <img src="${t.artwork['150x150']}">
            <div class="song-meta">
                <div class="song-title">${t.title}</div>
                <div class="song-artist">${t.album} • ${t.category}</div>
            </div>
        `;

        card.onclick = ()=>{
            currentQueue = tracks;
            currentIndex = i;
            play(t);
        };

        div.appendChild(card);
    });
}

// PLAY
function play(t){
    selectedSong = t;

    document.getElementById('p-img').src = t.artwork['150x150'];
    document.getElementById('full-img').src = t.artwork['480x480'];

    document.getElementById('p-title').innerText = t.title;
    document.getElementById('full-title').innerText = t.title;

    document.getElementById('p-artist').innerText = t.album;
    document.getElementById('full-artist').innerText = t.album;

    audio.src = t.streamUrl;
    audio.play();

    preloadAround(); // 🔥 cache
}

// PRELOAD (ÖNCEKİ + SONRAKİ)
function preloadAround(){
    cache = {};

    [currentIndex-1, currentIndex+1].forEach(i=>{
        if(currentQueue[i]){
            let a = new Audio();
            a.src = currentQueue[i].streamUrl;
            a.preload = "auto";
            cache[i] = a;
        }
    });
}

// NEXT / PREV
function nextTrack(){
    if(currentIndex < currentQueue.length-1){
        currentIndex++;
        play(currentQueue[currentIndex]);
    }
}

function prevTrack(){
    if(currentIndex > 0){
        currentIndex--;
        play(currentQueue[currentIndex]);
    }
}

// AUTO NEXT
audio.onended = ()=> nextTrack();

// SEARCH (kategori / albüm / isim)
function search(){
    let q = document.getElementById('searchInput').value.toLowerCase();

    let filtered = allSongs.filter(s =>
        s.title.toLowerCase().includes(q) ||
        s.album.toLowerCase().includes(q) ||
        s.category.toLowerCase().includes(q)
    );

    render(filtered);
}

// INIT
window.onload = ()=>{
    loadSongs();
};

document.getElementById('searchInput').onkeypress = e=>{
    if(e.key === "Enter") search();
};
</script>
